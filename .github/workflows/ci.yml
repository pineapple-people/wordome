name: Wordome CI

# Trigger the workflow on pushes to main or any pull request targeting main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          # If you have other dependencies, install them here:
          # pip install -e .

      - name: Run Ruff Check
        # Linter check
        # Based on rules defined from ruff.toml/pyproject.toml
        # Note: "--format=github" creates interactive annotations in the PR 'Files Changed' tab
        run: ruff check --output-format=github .

      - name: Run Ruff Format Check
        # Format check (readability)
        # Based on rules defined from ruff.toml/pyproject.toml
        run: ruff format --check .