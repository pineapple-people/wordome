name: wordome_env
channels:
  - conda-forge
dependencies:
  - python=3.12.9
  - pip
  - beautifulsoup4
  - ruff
  - fastapi
  - uvicorn
  # SnowflakeSQL
  - snowflake-connector-python>=3.7.0
  - pyarrow>=15.0.0
  - pydantic
  - pydantic-settings
  - pip:
    - curl_cffi # not available in conda-forge channel
    - -e .  # installs project (and its TOML deps) into the conda env
